name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build package
        run: nix build .#default --accept-flake-config

      - name: Archive source tree
        id: archive
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="dist/nixpkg-toolflow-mcp-${GITHUB_REF_NAME#v}.tar.gz"
          tar -czf "$asset" .
          echo "path=$asset" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.archive.outputs.path }}

